<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Steem Post</title>
</head>
<body>

<button onclick="postToSteem()">
    Post to Steem
</button>

<script>

function postToSteem()
{
    if (!window.steem_keychain)
    {
        alert("Install Steem Keychain");
        return;
    }

    const username = prompt("Steem username");

    const permlink = "test-post-" + Date.now();

    const operations = [[
        "comment",
        {
            parent_author: "",
            parent_permlink: "test",

            author: username,
            permlink: permlink,

            title: "Hello from GitHub Pages",

            body: "This post was created from my JavaScript game!",

            json_metadata: JSON.stringify({
                tags: ["test", "game"],
                app: "mygame/0.1"
            })
        }
    ]];

    window.steem_keychain.requestBroadcast(
        username,
        operations,
        "posting",
        function(response)
        {
            console.log(response);

            if(response.success)
            {
                alert("POST CREATED!");
            }
            else
            {
                alert("ERROR");
            }
        }
    );
}

</script>

</body>
</html>
