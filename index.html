<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Schulte Test</title>

<style>

body
{
    margin: 0;
    background: #202020;
    color: white;
    font-family: Arial;

    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

#container
{
    display: flex;
    gap: 60px;
    align-items: flex-start;
}

#board
{
    display: grid;
    gap: 6px;

    min-width: 420px;
    min-height: 420px;

    justify-content: center;
    align-content: center;
}

.cell
{
    width: 80px;
    height: 80px;

    background: #404040;

    border-radius: 10px;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 30px;

    cursor: pointer;
    user-select: none;

    transition: 0.15s;
}

.cell:hover
{
    background: #555;
}

.correct
{
    background: green;
}

.wrong
{
    background: crimson;
}

#side
{
    width: 520px;
}

button
{
    width: 100%;
    padding: 14px;

    border: none;
    border-radius: 10px;

    font-size: 22px;

    cursor: pointer;

    margin-bottom: 15px;
}

#startBtn
{
    background: #2e7d32;
    color: white;
}

#publishBtn
{
    background: #1565c0;
    color: white;
}

#rawBtn
{
    background: #6a1b9a;
    color: white;
}

#timer
{
    font-size: 44px;

    width: 180px;

    text-align: center;

    margin-bottom: 20px;

    font-family: monospace;
}

table
{
    width: 100%;
    border-collapse: collapse;

    margin-bottom: 20px;
}

td, th
{
    border: 1px solid #666;
    padding: 8px;
    text-align: center;
}

</style>
</head>

<body>

<div id="container">

    <div id="board"></div>

    <div id="side">

        <button id="startBtn" onclick="toggleGame()">
            START
        </button>

        <div id="timer">
            000.0
        </div>

        <table>

            <thead>
                <tr>
                    <th>Size</th>
                    <th>Test1</th>
                    <th>Test2</th>
                    <th>Test3</th>
                    <th>Avg</th>
                </tr>
            </thead>

            <tbody id="results"></tbody>

        </table>

        <button id="rawBtn" onclick="showRawData()">
            Raw Data
        </button>

        <button id="publishBtn" onclick="publishResults()">
            Publish
        </button>

    </div>

</div>

<script>

let size = 3;

let nextNumber = 1;

let running = false;

let attemptsPerSize = 3;

let currentAttempt = 1;

let timerInterval;

let globalStartTime;

let levelStartTime;

let lastCorrectTime;

let allResults = {};

let rawData = [];

const board =
    document.getElementById("board");

const timer =
    document.getElementById("timer");

const startBtn =
    document.getElementById("startBtn");

const resultsBody =
    document.getElementById("results");

function shuffle(arr)
{
    for(let i = arr.length - 1; i > 0; i--)
    {
        let j =
            Math.floor(Math.random() * (i + 1));

        [arr[i], arr[j]] =
            [arr[j], arr[i]];
    }
}

function createBoard()
{
    board.innerHTML = "";

    nextNumber = 1;

    levelStartTime = Date.now();

    lastCorrectTime = levelStartTime;

    board.style.gridTemplateColumns =
        `repeat(${size}, 80px)`;

    let numbers = [];

    for(let i = 1; i <= size * size; i++)
    {
        numbers.push(i);
    }

    shuffle(numbers);

    for(let n of numbers)
    {
        let cell =
            document.createElement("div");

        cell.className = "cell";

        cell.innerText = n;

        cell.onclick = function()
        {
            if(!running)
            {
                return;
            }

            if(n === nextNumber)
            {
                cell.classList.add("correct");

                const now = Date.now();

                rawData.push({

                    type: "correct",

                    size: size,

                    attempt: currentAttempt,

                    number: n,

                    totalElapsed:
                        (now - globalStartTime) / 1000,

                    reactionTime:
                        (now - lastCorrectTime) / 1000
                });

                lastCorrectTime = now;

                nextNumber++;

                if(nextNumber > size * size)
                {
                    finishLevel();
                }
            }
            else
            {
                cell.classList.add("wrong");

                setTimeout(() =>
                {
                    cell.classList.remove("wrong");
                }, 200);

                rawData.push({

                    type: "mistake",

                    size: size,

                    attempt: currentAttempt,

                    clicked: n,

                    expected: nextNumber,

                    totalElapsed:
                        (Date.now() - globalStartTime)
                        / 1000
                });
            }
        };

        board.appendChild(cell);
    }
}

function updateTimer()
{
    const t =
        (Date.now() - globalStartTime) / 1000;

    timer.innerText =
        t.toFixed(1).padStart(5, "0");
}

function startGame()
{
    allResults = {};

    rawData = [];

    size = 3;

    currentAttempt = 1;

    resultsBody.innerHTML = "";

    running = true;

    startBtn.innerText = "STOP";

    globalStartTime = Date.now();

    timerInterval =
        setInterval(updateTimer, 100);

    createBoard();
}

function stopGame()
{
    running = false;

    clearInterval(timerInterval);

    startBtn.innerText = "START";

    board.innerHTML = "";
}

function toggleGame()
{
    if(running)
    {
        stopGame();
    }
    else
    {
        startGame();
    }
}

function finishLevel()
{
    const time =
        ((Date.now() - levelStartTime)
        / 1000);

    if(!allResults[size])
    {
        allResults[size] = [];
    }

    allResults[size].push(time);

    renderResults();

    if(currentAttempt < attemptsPerSize)
    {
        currentAttempt++;

        createBoard();
    }
    else
    {
        currentAttempt = 1;

        if(size < 5)
        {
            size++;

            createBoard();
        }
        else
        {
            finishGame();
        }
    }
}

function finishGame()
{
    running = false;

    clearInterval(timerInterval);

    startBtn.innerText = "START";
}

function renderResults()
{
    resultsBody.innerHTML = "";

    for(let s in allResults)
    {
        let arr = allResults[s];

        let avg =
            arr.reduce((a,b)=>a+b,0)
            / arr.length;

        let row = "<tr>";

        row += `<td>${s}x${s}</td>`;

        for(let i = 0; i < attemptsPerSize; i++)
        {
            row +=
            `<td>${
                arr[i]
                ? arr[i].toFixed(1)
                : "-"
            }</td>`;
        }

        row +=
            `<td>${avg.toFixed(1)}</td>`;

        row += "</tr>";

        resultsBody.innerHTML += row;
    }
}

function showRawData()
{
    console.log(rawData);

    alert(
        "Raw data printed to console (F12)"
    );
}

function publishResults()
{
    if(Object.keys(allResults).length === 0)
    {
        alert("No results");
        return;
    }

    if(!window.steem_keychain)
    {
        alert("Install Steem Keychain");
        return;
    }

    const username =
        prompt("Steem username");

    let body =
        "Schulte Test Results\n\n";

    for(let s in allResults)
    {
        let arr = allResults[s];

        let avg =
            arr.reduce((a,b)=>a+b,0)
            / arr.length;

        body +=
            `${s}x${s} : `;

        for(let t of arr)
        {
            body +=
                t.toFixed(1) + " ";
        }

        body +=
            ` AVG=${avg.toFixed(1)}\n`;
    }

    body +=
        "\nRaw events: "
        + rawData.length;

    const permlink =
        "schulte-" + Date.now();

    const operations = [[
        "comment",
        {
            parent_author: "",
            parent_permlink: "games",

            author: username,

            permlink: permlink,

            title:
                "My Schulte Test",

            body: body,

            json_metadata:
                JSON.stringify({
                    tags: [
                        "game",
                        "psychology",
                        "schulte"
                    ],

                    app: "schulte/0.1"
                })
        }
    ]];

    window.steem_keychain.requestBroadcast(
        username,
        operations,
        "posting",

        function(response)
        {
            if(response.success)
            {
                alert("Published!");
            }
            else
            {
                alert("Publish error");
            }
        }
    );
}

</script>

</body>
</html>
