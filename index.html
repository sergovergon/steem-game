<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Schulte Table</title>

<style>

body
{
    margin: 0;
    font-family: Arial;
    background: #202020;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;

    height: 100vh;
}

#game
{
    display: flex;
    align-items: center;
    gap: 60px;
}

#board
{
    display: grid;
    gap: 6px;
}

.cell
{
    width: 80px;
    height: 80px;

    background: #404040;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 32px;
    cursor: pointer;
    user-select: none;

    border-radius: 10px;

    transition: 0.2s;
}

.cell:hover
{
    background: #555;
}

.done
{
    background: green;
}

#side
{
    font-size: 30px;
}

#info
{
    margin-top: 20px;
    font-size: 24px;
}

</style>
</head>

<body>

<div id="game">

    <div>
        <div id="board"></div>
        <div id="info"></div>
    </div>

    <div id="side">
        ⏱ <span id="timer">0.0</span>
    </div>

</div>

<script>

let size = 3;
let nextNumber = 1;

let startTime;
let timerInterval;

const board = document.getElementById("board");
const timer = document.getElementById("timer");
const info = document.getElementById("info");

function shuffle(arr)
{
    for(let i = arr.length - 1; i > 0; i--)
    {
        const j = Math.floor(Math.random() * (i + 1));

        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function createBoard()
{
    board.innerHTML = "";

    nextNumber = 1;

    board.style.gridTemplateColumns =
        `repeat(${size}, 80px)`;

    let numbers = [];

    for(let i = 1; i <= size * size; i++)
    {
        numbers.push(i);
    }

    shuffle(numbers);

    for(let n of numbers)
    {
        const cell = document.createElement("div");

        cell.className = "cell";
        cell.innerText = n;

        cell.onclick = function()
        {
            if(n === nextNumber)
            {
                cell.classList.add("done");

                nextNumber++;

                if(nextNumber > size * size)
                {
                    if(size < 5)
                    {
                        size++;

                        setTimeout(createBoard, 500);
                    }
                    else
                    {
                        finishGame();
                    }
                }
            }
        };

        board.appendChild(cell);
    }
}

function updateTimer()
{
    const t =
        (Date.now() - startTime) / 1000;

    timer.innerText = t.toFixed(1);
}

function finishGame()
{
    clearInterval(timerInterval);

    const result =
        (Date.now() - startTime) / 1000;

    info.innerHTML =
        "Finished in " + result.toFixed(1) + " sec";
}

function startGame()
{
    startTime = Date.now();

    timerInterval =
        setInterval(updateTimer, 100);

    createBoard();
}

startGame();

</script>

</body>
</html>
