<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Steem Post Test</title>
</head>
<body>

<h1>Steem Game</h1>

<button onclick="postToSteem()">
    Post to Steem
</button>

<script>

function postToSteem()
{
    if (!window.steem_keychain)
    {
        alert("Install Steem Keychain!");
        return;
    }

    const username = prompt("Enter your Steem username");

    const permlink =
        "game-post-" + Date.now();

    window.steem_keychain.requestPost(
        username,
        "My Game Result",
        "I played the game on GitHub Pages!",
        permlink,
        "",
        JSON.stringify({
            tags: ["game", "steem", "test"],
            app: "mygame/0.1"
        }),
        function(response)
        {
            console.log(response);

            if (response.success)
            {
                alert("Post created!");
            }
            else
            {
                alert("Canceled or error");
            }
        }
    );
}

</script>

</body>
</html>
